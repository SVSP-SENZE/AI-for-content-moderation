<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Moderation</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin-top: 0;
            font-weight: 600;
            font-size: 2rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 400;
            color: var(--text-muted);
        }

        input[type="file"], input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: var(--text);
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="file"]:focus, input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: none;
            background-color: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        #results {
            margin-top: 2rem;
            display: none;
            padding: 1.5rem;
            border-radius: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .verdict {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .verdict.SAFE { color: var(--success); }
        .verdict.UNSAFE { color: var(--danger); }

        .loader {
            display: none;
            text-align: center;
            margin-top: 1rem;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        pre {
            background: #000;
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            overflow-x: auto;
            color: #10b981;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>AI Content Moderator</h1>
            <p class="subtitle">Upload videos to scan for safety violations</p>

            <form id="uploadForm">
                <div class="form-group">
                    <label for="my_video">Choose Video</label>
                    <input type="file" id="my_video" name="my_video" accept="video/*" required>
                </div>
                <div class="form-group">
                    <label for="text">Context Text (Optional)</label>
                    <input type="text" id="text" name="text" placeholder="e.g. This is a tutorial about electronics">
                </div>
                <button type="submit" id="submitBtn">Analyze Content</button>
            </form>

            <div class="loader" id="loader">
                <div class="spinner"></div> Scanning content with AI...
            </div>

            <div id="results">
                <div class="verdict" id="verdict"></div>
                <div id="flags"></div>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 1rem;">Raw Analysis Report:</p>
                <pre id="rawReport"></pre>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const resultsDiv = document.getElementById('results');
        const loader = document.getElementById('loader');
        const submitBtn = document.getElementById('submitBtn');

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const formData = new FormData(form);
            loader.style.display = 'block';
            resultsDiv.style.display = 'none';
            submitBtn.disabled = true;

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    const report = data.analysis_report;
                    const verdictElem = document.getElementById('verdict');
                    verdictElem.textContent = `Verdict: ${report.verdict}`;
                    verdictElem.className = `verdict ${report.verdict}`;
                    
                    document.getElementById('rawReport').textContent = JSON.stringify(report, null, 2);
                    
                    resultsDiv.style.display = 'block';
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (error) {
                alert('An error occurred during upload.');
                console.error(error);
            } finally {
                loader.style.display = 'none';
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
